name: Auto Update Anime Data

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

# 🌟 التعديل الأول: إعطاء صلاحية الكتابة للسيرفر لكي يتمكن من حفظ الملفات 🌟
permissions:
  contents: write

jobs:
  update-database:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # 🌟 التعديل الثاني: تحديث نسخة Node.js لحل التحذير 🌟

      - name: Run Fetch Script
        run: node fetchData.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add api/
          git commit -m "تحديث تلقائي لقاعدة بيانات الأنمي 🚀" || echo "لا توجد تغييرات جديدة للحفظ"
          git push origin HEAD
